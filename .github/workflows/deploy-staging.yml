name: Deploy to Staging

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-staging
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to CF Pages (Staging)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_API_URL: https://console-staging.runhq.io
          # GA4 Measurement ID, injected from a repo secret (not committed).
          # If the secret is unset the build omits analytics entirely.
          # Staging must never report into the production GA property. `none` is an
          # explicit opt-out (see resolveGaId in src/analytics.ts). Do NOT "disable"
          # it by leaving this empty: a staging build is still a production-MODE
          # vite build, so an empty value falls back to the production property and
          # pollutes real data with staging traffic.
          VITE_GA_ID: none

      - name: Deploy to Cloudflare Pages
        run: npx wrangler pages deploy dist --project-name=runhq-homepage-staging --branch=main --commit-dirty=true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  health-check:
    name: Health Check
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - name: Wait for deployment to propagate
        run: sleep 15

      - name: Check staging site
        run: |
          for i in 1 2 3 4 5; do
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" https://staging.runhq.io)
            if [ "$HTTP_CODE" = "200" ]; then
              echo "Health check passed (HTTP 200)"
              exit 0
            fi
            echo "Attempt $i: HTTP $HTTP_CODE, retrying in 10s..."
            sleep 10
          done
          echo "Health check failed after 5 attempts"
          exit 1
