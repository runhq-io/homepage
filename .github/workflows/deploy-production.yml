name: Deploy to Production

on:
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to CF Pages (Production)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_API_URL: https://console.runhq.io
          # A GA4 Measurement ID is NOT a secret — it ships in cleartext in every
          # visitor's bundle. It used to be read from `secrets.VITE_GA_ID`, that
          # secret was never actually set, and the build silently shipped with
          # analytics disabled: www.runhq.io captured nothing for weeks. Declaring
          # it as plain config here makes that failure impossible to repeat.
          VITE_GA_ID: G-PK433W7S1P

      - name: Deploy to Cloudflare Pages
        run: npx wrangler pages deploy dist --project-name=fishtank-homepage --branch=main --commit-dirty=true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  health-check:
    name: Health Check
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - name: Wait for deployment to propagate
        run: sleep 15

      - name: Check production site
        run: |
          for i in 1 2 3 4 5; do
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" https://www.runhq.io)
            if [ "$HTTP_CODE" = "200" ]; then
              echo "Health check passed (HTTP 200)"
              exit 0
            fi
            echo "Attempt $i: HTTP $HTTP_CODE, retrying in 10s..."
            sleep 10
          done
          echo "Health check failed after 5 attempts"
          exit 1
